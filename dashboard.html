<!DOCTYPE html>
<html lang="en" data-theme="void">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Usage</title>
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self'">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Manrope:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #16151f;
            --surface: #1e1d2b;
            --surface-alt: #242334;
            --primary: #9d7dfc;
            --secondary: #6e8fff;
            --text: #e2e0f0;
            --text-dim: #6b6990;
            --border: #2d2c44;
            --danger: #e05252;
            --success: #7af0c0;
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'DM Sans', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            user-select: none;
            overflow-x: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--surface); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        /* ── Shared header ── */
        .view-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .view-header h2 {
            font-family: 'Manrope', system-ui, sans-serif;
            font-weight: 600;
            font-size: 1rem;
            flex: 1;
            text-align: center;
            color: var(--text);
            letter-spacing: -0.01em;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 1.1rem;
            padding: 4px 6px;
            border-radius: 6px;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, color 0.2s;
        }

        .icon-btn:hover {
            background: var(--surface-alt);
            color: var(--text);
        }

        /* ── View containers ── */
        .view {
            display: flex;
            flex-direction: column;
            flex: 1;
            overflow: hidden;
        }

        .view.hidden {
            display: none;
        }

        .view-body {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            padding-bottom: 80px;
        }

        /* ── Stat cards ── */
        .stat-cards {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        .stat-card {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 16px;
            text-align: center;
            box-shadow: 0 4px 16px rgba(0,0,0,0.35);
        }

        .stat-label {
            font-size: 0.68rem;
            font-weight: 700;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 8px;
        }

        .stat-value {
            font-family: 'Manrope', system-ui, sans-serif;
            font-size: 2rem;
            font-weight: 700;
            line-height: 1;
        }

        .stat-sublabel {
            font-size: 0.68rem;
            color: var(--text-dim);
            margin-top: 6px;
            font-family: 'Fira Code', monospace;
        }

        .stat-values-row {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .stat-col {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ── Chart ── */
        .chart-container {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 12px 8px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.35);
        }

        .chart-legend {
            display: flex;
            gap: 16px;
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-bottom: 8px;
        }

        .legend-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 4px;
            vertical-align: middle;
        }

        .no-data {
            color: var(--text-dim);
            font-size: 0.9rem;
            text-align: center;
            padding: 48px 0;
        }

        /* ── Settings sections ── */
        .section {
            background: var(--surface);
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 16px rgba(0,0,0,0.35);
        }

        .section-title {
            font-size: 0.68rem;
            font-weight: 700;
            color: var(--text-dim);
            margin-bottom: 14px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .option {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .option:last-child {
            margin-bottom: 0;
        }

        .option-label {
            font-size: 0.9rem;
            color: var(--text);
        }

        select {
            background: var(--surface-alt);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 5px 10px;
            border-radius: 6px;
            outline: none;
            font-family: 'DM Sans', system-ui, sans-serif;
            font-size: 0.88rem;
            transition: border-color 0.2s;
            cursor: pointer;
        }

        select:focus {
            border-color: var(--primary);
        }

        /* ── Footer ── */
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            padding: 14px 20px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            z-index: 100;
        }

        button {
            padding: 7px 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-family: 'DM Sans', system-ui, sans-serif;
            font-size: 0.88rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--primary);
            color: var(--bg);
        }

        .btn-primary:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-dim);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .btn-danger {
            background: transparent;
            color: var(--danger);
            border: 1px solid rgba(224, 82, 82, 0.4);
            width: 100%;
        }

        .btn-danger:hover {
            background: rgba(224, 82, 82, 0.1);
        }

        /* ── Toggle switch ── */
        label.switch {
            position: relative;
            display: inline-block;
            width: 34px;
            height: 20px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--surface-alt);
            border: 1px solid var(--border);
            transition: .3s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 2px;
            bottom: 2px;
            background-color: var(--text-dim);
            transition: .3s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: var(--primary);
            border-color: var(--primary);
        }

        input:checked+.slider:before {
            background-color: var(--bg);
            transform: translateX(14px);
        }
    </style>
</head>

<body>

    <!-- ══════════════════════════════════════════════════════════════════════
         View: Dashboard
    ═══════════════════════════════════════════════════════════════════════ -->
    <div id="view-dashboard" class="view">
        <div class="view-header">
            <div style="width:32px"></div>
            <h2>Claude Usage</h2>
            <button class="icon-btn" id="settingsBtn" title="Settings">⚙</button>
        </div>
        <div class="view-body" style="padding-bottom: 16px;">
            <div id="stats-content"><div class="no-data">Loading...</div></div>
        </div>
    </div>

    <!-- ══════════════════════════════════════════════════════════════════════
         View: Settings
    ═══════════════════════════════════════════════════════════════════════ -->
    <div id="view-settings" class="view hidden">
        <div class="view-header">
            <button class="icon-btn" id="backBtn" title="Back">←</button>
            <h2>Settings</h2>
            <div style="width:32px"></div>
        </div>
        <div class="view-body">

            <div class="section">
                <div class="section-title">Visuals</div>
                <div class="option">
                    <span class="option-label">Display Mode</span>
                    <select id="displayMode">
                        <option value="icon">Icon Only</option>
                        <option value="number">Number Only</option>
                        <option value="both">Icon & Number</option>
                    </select>
                </div>
                <div class="option" id="iconStyleSection">
                    <span class="option-label">Icon Style</span>
                    <select id="iconStyle">
                        <option value="rings">Rings</option>
                        <option value="bars">Bars</option>
                    </select>
                </div>
                <div class="option" id="timeStyleSection">
                    <span class="option-label">Time Display</span>
                    <select id="timeStyle">
                        <option value="absolute">Absolute Time</option>
                        <option value="countdown">Time Until</option>
                    </select>
                </div>
                <div class="option" id="overlayDisplaySection">
                    <span class="option-label">Number to Show</span>
                    <select id="overlayDisplay">
                        <option value="none">None</option>
                        <option value="session">Session %</option>
                        <option value="weekly">Weekly %</option>
                    </select>
                </div>
                <div class="option" id="overlayStyleSection">
                    <span class="option-label">Number Font Style</span>
                    <select id="overlayStyle">
                        <option value="classic">Classic Giant</option>
                        <option value="digital">Digital 7-Seg</option>
                        <option value="bold">Ultra-Bold</option>
                    </select>
                </div>
                <div class="option" id="colorOverlayModeSection">
                    <span class="option-label">Color</span>
                    <select id="colorOverlayMode">
                        <option value="number">Number</option>
                        <option value="background">Background</option>
                        <option value="none">None</option>
                    </select>
                </div>
            </div>

            <div class="section">
                <div class="section-title">General</div>
                <div class="option">
                    <span class="option-label">Launch at Login</span>
                    <label class="switch">
                        <input type="checkbox" id="launchAtLogin">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <div class="section">
                <div class="section-title">Tokens</div>
                <div class="option">
                    <span class="option-label">Remaining Tokens Estimate</span>
                    <label class="switch">
                        <input type="checkbox" id="estimateTokens">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="option">
                    <span class="option-label">Session Plan</span>
                    <input type="number" id="sessionPlan"
                        style="background:var(--surface-alt);color:var(--text);border:1px solid var(--border);padding:5px 8px;border-radius:6px;outline:none;width:100px;font-family:'DM Sans',system-ui,sans-serif;"
                        disabled>
                </div>
                <div class="option">
                    <span class="option-label">Weekly Plan</span>
                    <input type="number" id="weeklyPlan"
                        style="background:var(--surface-alt);color:var(--text);border:1px solid var(--border);padding:5px 8px;border-radius:6px;outline:none;width:100px;font-family:'DM Sans',system-ui,sans-serif;"
                        disabled>
                </div>
            </div>

            <div class="section">
                <div class="section-title">Colors</div>
                <div id="colorContainer"></div>
                <button class="btn-secondary" id="addColorBtn"
                    style="margin-top: 10px; width: 100%; font-size: 0.8rem;">+ Add Color Threshold</button>
            </div>

            <div class="section">
                <div class="section-title">Updates</div>
                <div class="option" id="updateStatusOption">
                    <span class="option-label" id="appVersionLabel">Version: ...</span>
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <button class="btn-secondary" id="refreshUpdateBtn"
                            style="padding: 4px 8px; font-size: 0.7rem;">Refresh ↻</button>
                        <span id="updateStateLabel" style="font-size: 0.82rem; color: var(--text-dim);"></span>
                        <button class="btn-primary" id="updateBtn"
                            style="display: none; padding: 4px 10px; font-size: 0.8rem;">Update</button>
                    </div>
                </div>
                <div style="margin-top: 15px;">
                    <button class="btn-secondary" id="copyLogsBtn" style="width: 100%; font-size: 0.8rem;"
                        title="Copy app logs for debugging">Copy Debug Logs</button>
                </div>
            </div>

            <div class="section" style="border-color: rgba(224,82,82,0.3);">
                <div class="section-title" style="color: var(--danger);">Account</div>
                <button class="btn-danger" id="logoutBtn">Log Out</button>
            </div>

        </div>

        <div class="footer">
            <button class="btn-secondary" id="cancelBtn">Cancel</button>
            <button class="btn-primary" id="saveBtn">Save Settings</button>
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>

</html>
