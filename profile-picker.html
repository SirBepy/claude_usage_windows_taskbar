<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'">
  <title>Sign in to Claude</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      height: 460px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ── Header ── */
    .header {
      padding: 20px 24px 14px;
      border-bottom: 1px solid #313244;
      flex-shrink: 0;
    }
    .header h1 { font-size: 15px; font-weight: 600; color: #cba6f7; }
    .header p  { font-size: 12px; color: #6c7086; margin-top: 3px; }

    /* ── Profile list ── */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 16px 24px 8px;
    }
    .content::-webkit-scrollbar       { width: 4px; }
    .content::-webkit-scrollbar-track { background: transparent; }
    .content::-webkit-scrollbar-thumb { background: #45475a; border-radius: 2px; }

    .section-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: #585b70;
      margin-bottom: 10px;
    }

    .profiles { display: flex; flex-direction: column; gap: 6px; }

    .profile-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #313244;
      cursor: pointer;
      transition: border-color 0.12s, background 0.12s;
    }
    .profile-card:hover            { background: #25253a; border-color: #45475a; }
    .profile-card.selected         { border-color: #cba6f7; background: #2d2b45; }

    .avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: #313244;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 600;
      color: #cba6f7;
      flex-shrink: 0;
    }
    .profile-info   { flex: 1; min-width: 0; }
    .profile-name   { font-size: 13px; font-weight: 500; }
    .profile-email  {
      font-size: 11px; color: #6c7086; margin-top: 1px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .radio {
      width: 16px; height: 16px;
      border-radius: 50%;
      border: 2px solid #45475a;
      flex-shrink: 0;
      transition: border-color 0.12s, background 0.12s;
      position: relative;
    }
    .profile-card.selected .radio {
      border-color: #cba6f7;
      background: radial-gradient(circle, #cba6f7 5px, transparent 5.5px);
    }

    .empty-msg { font-size: 12px; color: #585b70; padding: 8px 0; }

    /* ── Footer ── */
    .footer {
      flex-shrink: 0;
      padding: 12px 24px 18px;
      border-top: 1px solid #313244;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .btn {
      padding: 9px 16px;
      border-radius: 7px;
      border: none;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.1s, filter 0.1s;
      width: 100%;
    }
    .btn:disabled              { opacity: 0.4; cursor: default; }
    .btn-primary               { background: #cba6f7; color: #1e1e2e; }
    .btn-primary:not(:disabled):hover { filter: brightness(1.1); }
    .btn-secondary             { background: #313244; color: #cdd6f4; }
    .btn-secondary:not(:disabled):hover { background: #3d3f5a; }

    .divider {
      display: flex; align-items: center; gap: 10px;
      color: #45475a; font-size: 11px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: #313244;
    }

    .status {
      font-size: 11px;
      color: #f38ba8;
      text-align: center;
      min-height: 15px;
    }
    .status.ok { color: #a6e3a1; }
  </style>
</head>
<body>

<div class="header">
  <h1>Sign in to Claude</h1>
  <p>Choose how you'd like to authenticate</p>
</div>

<div class="content">
  <div class="section-label">Import from Chrome profile</div>
  <div class="profiles" id="profiles">
    <div class="empty-msg">Scanning profiles...</div>
  </div>
</div>

<div class="footer">
  <button class="btn btn-primary"   id="importBtn" disabled>Use Selected Profile</button>
  <div class="status" id="status"></div>
  <div class="divider">or</div>
  <button class="btn btn-secondary" id="freshBtn">Sign in Fresh</button>
</div>

<script>
  const profilesEl = document.getElementById('profiles');
  const importBtn  = document.getElementById('importBtn');
  const freshBtn   = document.getElementById('freshBtn');
  const statusEl   = document.getElementById('status');

  let selectedDir = null;

  function setStatus(msg, ok = false) {
    statusEl.textContent = msg;
    statusEl.className   = 'status' + (ok ? ' ok' : '');
  }

  function renderProfiles(profiles) {
    if (!profiles.length) {
      profilesEl.innerHTML = '<div class="empty-msg">No Chrome profiles found.</div>';
      return;
    }

    profilesEl.innerHTML = '';
    profiles.forEach(p => {
      const card = document.createElement('div');
      card.className    = 'profile-card';
      card.dataset.dir  = p.dir;
      card.innerHTML    = `
        <div class="avatar">${(p.name || '?')[0].toUpperCase()}</div>
        <div class="profile-info">
          <div class="profile-name">${p.name}</div>
          ${p.email ? `<div class="profile-email">${p.email}</div>` : ''}
        </div>
        <div class="radio"></div>
      `;
      card.addEventListener('click', () => {
        document.querySelectorAll('.profile-card').forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');
        selectedDir = p.dir;
        importBtn.disabled = false;
        setStatus('');
      });
      profilesEl.appendChild(card);
    });
  }

  importBtn.addEventListener('click', async () => {
    if (!selectedDir) return;
    importBtn.disabled   = true;
    freshBtn.disabled    = true;
    importBtn.textContent = 'Importing...';
    setStatus('');

    const result = await window.profileAPI.importProfile(selectedDir);

    if (result.success) {
      setStatus(`Imported ${result.count} cookies — starting...`, true);
      // main process closes this window after verifying the session
    } else {
      setStatus(result.message || 'Import failed');
      importBtn.disabled    = false;
      freshBtn.disabled     = false;
      importBtn.textContent = 'Use Selected Profile';
    }
  });

  freshBtn.addEventListener('click', () => window.profileAPI.signInFresh());

  // Load profiles on startup
  window.profileAPI.getChromeProfiles().then(renderProfiles);
</script>

</body>
</html>
