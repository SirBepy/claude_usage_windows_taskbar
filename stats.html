<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>AI Usage Stats</title>
    <style>
        body {
            background-color: #111111;
            color: #eeeeee;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        h1 { font-weight: 400; font-size: 1.5rem; margin-bottom: 1rem; }
        p { color: #888888; font-size: 0.9rem; }
    </style>
</head>
<body>
    <h1>Usage Statistics</h1>
    <p>Loading history data...</p>
    <script>
        // Placeholder for Ticket 3 rendering logic.
        // Verifies IPC bridge connectivity.
        window.electronAPI?.getUsageHistory().then(history => {
            console.log("History loaded:", history);
            document.querySelector('p').innerText = history.length > 0 
                ? `Logged ${history.length} snapshots.` 
                : "No history recorded yet.";
        });

        window.electronAPI?.onHistoryUpdated((history) => {
            console.log("History updated:", history);
            document.querySelector('p').innerText = `Updated: ${history.length} snapshots.`;
        });
    </script>
</body>
</html>
