<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - AI Usage</title>
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'">
    <style>
        :root {
            --bg: #121212;
            --surface: #1e1e1e;
            --primary: #4a90e2;
            --text: #e0e0e0;
            --text-dim: #999;
            --border: #333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            padding: 20px;
            padding-bottom: 80px;
            /* Space for sticky footer */
            user-select: none;
            overflow-x: hidden;
        }

        h2 {
            font-weight: 500;
            margin-bottom: 20px;
            font-size: 1.2rem;
        }

        .section {
            background: var(--surface);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid var(--border);
        }

        .section-title {
            font-size: 0.9rem;
            color: var(--text-dim);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .option {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .option:last-child {
            margin-bottom: 0;
        }

        .option-label {
            font-size: 0.95rem;
        }

        select {
            background: #2a2a2a;
            color: var(--text);
            border: 1px solid var(--border);
            padding: 4px 8px;
            border-radius: 4px;
            outline: none;
        }

        select:focus {
            border-color: var(--primary);
        }

        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            padding: 16px 20px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            z-index: 100;
        }

        button {
            padding: 8px 16px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.2s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: #357abd;
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-dim);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: #2a2a2a;
        }

        label.switch {
            position: relative;
            display: inline-block;
            width: 34px;
            height: 20px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #333;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 2px;
            bottom: 2px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: var(--primary);
        }

        input:checked+.slider:before {
            transform: translateX(14px);
        }
    </style>
</head>

<body>
    <h2>Settings</h2>

    <div class="section">
        <div class="section-title">Visuals</div>
        <div class="option">
            <span class="option-label">Display Mode</span>
            <select id="displayMode">
                <option value="icon">Icon Only</option>
                <option value="number">Number Only</option>
                <option value="both">Icon & Number</option>
            </select>
        </div>
        <div class="option" id="iconStyleSection">
            <span class="option-label">Icon Style</span>
            <select id="iconStyle">
                <option value="rings">Rings</option>
                <option value="bars">Bars</option>
            </select>
        </div>
        <div class="option" id="timeStyleSection">
            <span class="option-label">Time Display</span>
            <select id="timeStyle">
                <option value="absolute">Absolute Time</option>
                <option value="countdown">Time Until</option>
            </select>
        </div>
        <div class="option" id="overlayDisplaySection">
            <span class="option-label">Number to Show</span>
            <select id="overlayDisplay">
                <option value="none">None</option>
                <option value="session">Session %</option>
                <option value="weekly">Weekly %</option>
            </select>
        </div>
        <div class="option" id="overlayStyleSection">
            <span class="option-label">Number Font Style</span>
            <select id="overlayStyle">
                <option value="classic">Classic Giant</option>
                <option value="digital">Digital 7-Seg</option>
                <option value="bold">Ultra-Bold</option>
            </select>
        </div>
        <div class="option" id="colorOverlayNumberSection">
            <span class="option-label">Color Number with Thresholds</span>
            <label class="switch">
                <input type="checkbox" id="colorOverlayNumber">
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <div class="section">
        <div class="section-title">General</div>
        <div class="option">
            <span class="option-label">Launch at Login</span>
            <label class="switch">
                <input type="checkbox" id="launchAtLogin">
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <div class="section">
        <div class="section-title">Tokens</div>
        <div class="option">
            <span class="option-label">Remaining Tokens Estimate</span>
            <label class="switch">
                <input type="checkbox" id="estimateTokens">
                <span class="slider"></span>
            </label>
        </div>
        <div class="option">
            <span class="option-label">Session Plan</span>
            <input type="number" id="sessionPlan"
                style="background:#2a2a2a;color:var(--text);border:1px solid var(--border);padding:4px 8px;border-radius:4px;outline:none;width:100px;"
                disabled>
        </div>
        <div class="option">
            <span class="option-label">Weekly Plan</span>
            <input type="number" id="weeklyPlan"
                style="background:#2a2a2a;color:var(--text);border:1px solid var(--border);padding:4px 8px;border-radius:4px;outline:none;width:100px;"
                disabled>
        </div>
    </div>

    <div class="section">
        <div class="section-title">Colors</div>
        <div id="colorContainer">
            <!-- Dynamic color rows will be added here -->
        </div>
        <button class="btn-secondary" id="addColorBtn" style="margin-top: 10px; width: 100%; font-size: 0.8rem;">+ Add
            Color Threshold</button>
    </div>

    <div class="section">
        <div class="section-title">Updates</div>
        <div class="option" id="updateStatusOption">
            <span class="option-label" id="appVersionLabel">Version: ...</span>
            <div style="display: flex; align-items: center; gap: 10px;">
                <button class="btn-secondary" id="refreshUpdateBtn" style="padding: 4px 8px; font-size: 0.7rem;">Refresh ↻</button>
                <span id="updateStateLabel" style="font-size: 0.85em; color: var(--text-dim);"></span>
                <button class="btn-primary" id="updateBtn"
                    style="display: none; padding: 4px 8px; font-size: 0.8rem;">Update</button>
            </div>
        </div>
        <div id="updateInfo" style="display: none; margin-top: 10px; font-size: 0.85em; color: var(--primary);">
            <div id="updateStatus">Checking for updates...</div>
        </div>
    </div>

    <div class="footer">
        <button class="btn-secondary" id="cancelBtn">Cancel</button>
        <button class="btn-primary" id="saveBtn">Save Settings</button>
    </div>

    <script src="settings.js"></script>
</body>

</html>
